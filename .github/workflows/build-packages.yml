name: Build Packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  # ---- Unit Tests (Ubuntu) ----
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            qt6-base-dev \
            libgtest-dev googletest

      - name: Configure (tests enabled)
        run: |
          rm -rf build
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DBUILD_FCITX=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -V

  # ---- Build .deb (Ubuntu 24.04, native — после каждого пуша) ----
  build-deb:
    name: Build .deb (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    needs: unit-tests
    steps:
      - uses: actions/checkout@v5

      - name: Install packaging build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            debhelper cmake pkg-config dh-cmake \
            qt6-base-dev libevdev-dev libxkbcommon-dev \
            dpkg-dev fakeroot build-essential

      - name: Build .deb and copy to dist/
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh

      - name: Upload .deb artefact
        uses: actions/upload-artifact@v4
        with:
          name: punto-switcher-deb
          path: dist/*.deb
          retention-days: 30

  # ---- Build .rpm (Fedora 41) ----
  build-rpm:
    name: Build .rpm (Fedora 41)
    runs-on: ubuntu-24.04
    needs: unit-tests
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -f docker/Dockerfile.rpm -t punto-rpm-builder .

      - name: Run build container
        run: |
          mkdir -p dist
          docker run --rm -v "$PWD/dist:/dist" punto-rpm-builder

      - name: Upload .rpm artefact
        uses: actions/upload-artifact@v4
        with:
          name: punto-switcher-rpm
          path: dist/*.rpm
          retention-days: 30

  # ---- Release (on tag) ----
  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [build-deb, build-rpm]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: punto-switcher-deb
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: punto-switcher-rpm
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
